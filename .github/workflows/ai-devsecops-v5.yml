name: CI DevSecOps (javascript)
# Domain: general (confidence: 1.00)
# Architecture: monolithic
# Priority threats: none specific (no domain detected)

"on":
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:


permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        continue-on-error: true

      - name: Run ESLint
        run: |
          if [ -f package.json ] && grep -q '"lint"' package.json; then
            npm run lint --if-present
          else
            echo 'No lint script defined; skipping.'
          fi

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        continue-on-error: true

      - name: Run tests
        run: npm test --if-present || true

  sast:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Run semgrep
        uses: returntocorp/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
        with:
          config: >-
            p/owasp-top-ten
            p/javascript
            p/nodejs
            p/expressjs
            p/sql-injection
            p/secrets
            p/dockerfile
          output_format: json
          output: semgrep-results.json
        continue-on-error: true

      - name: Upload Semgrep JSON
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: semgrep-results-${{ github.sha }}
          path: semgrep-results.json
          if-no-files-found: warn
          retention-days: 30

  dependency-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (no native build)
        run: npm ci --no-audit --no-fund --ignore-scripts
        continue-on-error: true

      - name: Run npm audit (CVE check, JSON output)
        id: npm-audit
        run: npm audit --audit-level=high --json > npm-audit-results.json || true
        continue-on-error: true

      - name: Upload npm audit JSON
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: npm-audit-results-${{ github.sha }}
          path: npm-audit-results.json
          if-no-files-found: warn
          retention-days: 30

      - name: Run Trivy filesystem scan (JSON output)
        id: trivy-fs
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-fs-results.json'
          severity: 'HIGH,CRITICAL'
        continue-on-error: true

      - name: Upload Trivy fs JSON
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: trivy-fs-results-${{ github.sha }}
          path: trivy-fs-results.json
          if-no-files-found: warn
          retention-days: 30

      - name: Evaluate dependency-scan findings
        if: always()
        run: |
          echo '## Dependency Scan Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '- npm audit: '"${{ steps.npm-audit.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo '- trivy fs: '"${{ steps.trivy-fs.outcome }}" >> "$GITHUB_STEP_SUMMARY"

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
        continue-on-error: true

  container-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Build Docker image
        run: docker build -t app:ci-${{ github.sha }} .
        continue-on-error: true

      - name: Scan image with Trivy (JSON output)
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        with:
          image-ref: 'app:ci-${{ github.sha }}'
          format: 'json'
          output: 'trivy-image-results.json'
          severity: 'HIGH,CRITICAL'
        continue-on-error: true

      - name: Upload Trivy image JSON
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: trivy-image-results-${{ github.sha }}
          path: trivy-image-results.json
          if-no-files-found: warn
          retention-days: 30
