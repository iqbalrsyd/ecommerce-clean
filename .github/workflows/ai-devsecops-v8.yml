name: CI DevSecOps (javascript)
# Domain: general (confidence: 1.00)
# Architecture: monolithic
# Priority threats: none specific (no domain detected)

"on":
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:


permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        continue-on-error: true

      - name: Run ESLint
        run: |
          if [ -f package.json ] && grep -q '"lint"' package.json; then
            npm run lint --if-present
          else
            echo 'No lint script defined; skipping.'
          fi

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        continue-on-error: true

      - name: Run tests
        run: npm test --if-present || true

  sast:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Show enabled custom Semgrep rule files
        run: |
          echo "Custom Semgrep rules enabled for this domain:"
          for f in .semgrep/*.yml; do
            [ -f "$f" ] && echo "  - $f"
          done

      - name: Run semgrep (SARIF output via docker)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src:ro" \
            -v "${{ github.workspace }}:/out" \
            returntocorp/semgrep:1.99.0 \
            semgrep \
            --config=p/owasp-top-ten \
            --config=p/javascript \
            --config=p/nodejs \
            --config=p/expressjs \
            --config=p/sql-injection \
            --config=p/secrets \
            --config=p/dockerfile \
            --config=/src/.semgrep/owasp-api.yml \
                    --sarif \
                    --output=/out/semgrep-results.sarif \
                    --timeout=600 \
                    --error \
                    /src
        continue-on-error: true

      - name: Ensure Semgrep SARIF file exists (fallback for 0 findings or scan error)
        if: always()
        run: |
          if [ ! -s semgrep-results.sarif ]; then
            echo "::notice::Semgrep did not produce a SARIF file. Generating empty SARIF for upload-sarif."
            printf '%s\n' \
              '{' \
              '  "version": "2.1.0",' \
              '  "$schema": "https://json.schemastore.org/sarif-2.1.0.json",' \
              '  "runs": [' \
              '    {' \
              '      "tool": {' \
              '        "driver": {' \
              '          "name": "Semgrep",' \
              '          "version": "1.99.0",' \
              '          "informationUri": "https://semgrep.dev"' \
              '        }' \
              '      },' \
              '      "results": []' \
              '    }' \
              '  ]' \
              '}' > semgrep-results.sarif
          fi
          echo "✓ semgrep-results.sarif size: $(stat -c%s semgrep-results.sarif) bytes"

      - name: Upload Semgrep SARIF to GitHub Code Scanning
        if: always() && hashFiles('semgrep-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Upload Semgrep SARIF as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: semgrep-results-${{ github.sha }}
          path: semgrep-results.sarif
          if-no-files-found: warn
          retention-days: 30

  dependency-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (no native build)
        run: npm ci --no-audit --no-fund --ignore-scripts
        continue-on-error: true

      - name: Run npm audit (CVE check, JSON output)
        id: npm-audit
        run: npm audit --audit-level=high --json > npm-audit-results.json || true
        continue-on-error: true

      - name: Upload npm audit JSON
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: npm-audit-results-${{ github.sha }}
          path: npm-audit-results.json
          if-no-files-found: warn
          retention-days: 30

      - name: Run Trivy DB update
        run: docker run --rm aquasec/trivy:0.65.0 image --download-db-only
        continue-on-error: true

      - name: Run Trivy filesystem scan (SARIF output)
        id: trivy-fs
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'HIGH,CRITICAL'
        continue-on-error: true

      - name: Ensure trivy-fs-results.sarif exists (fallback for 0 findings)
        if: always()
        run: |
          if [ ! -s trivy-fs-results.sarif ]; then
            echo "::notice::Trivy found 0 findings. Generating empty SARIF to satisfy upload-sarif."
            printf '%s\n' \
              '{' \
              '  "version": "2.1.0",' \
              '  "$schema": "https://json.schemastore.org/sarif-2.1.0.json",' \
              '  "runs": [' \
              '    {' \
              '      "tool": {' \
              '        "driver": {' \
              '          "name": "Trivy",' \
              '          "version": "0.65.0",' \
              '          "informationUri": "https://aquasecurity.github.io/trivy/"' \
              '        }' \
              '      },' \
              '      "results": []' \
              '    }' \
              '  ]' \
              '}' > trivy-fs-results.sarif
          fi
          echo "✓ trivy-fs-results.sarif size: $(stat -c%s trivy-fs-results.sarif) bytes"
      - name: Upload Trivy fs SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs
      - name: Upload Trivy fs SARIF as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: trivy-fs-results-${{ github.sha }}
          path: trivy-fs-results.sarif
          if-no-files-found: warn
          retention-days: 30
      - name: Convert npm audit JSON to SARIF
        if: always() && hashFiles('npm-audit-results.json') != ''
        run: |
          python3 -c "
          import json, sys
          try:
              with open('npm-audit-results.json') as f:
                  data = json.load(f)
              vulns = data.get('vulnerabilities', {})
              results = []
              for pkg, info in vulns.items():
                  if not info.get('via'):
                      continue
                  severity = info.get('severity','moderate')
                  level = 'error' if severity in ('critical','high') else 'warning'
                  seen_cves = set()
                  for via in info['via']:
                      if isinstance(via, dict):
                          cve_id = via.get('title','')
                          if cve_id and cve_id not in seen_cves:
                              seen_cves.add(cve_id)
                              results.append({
                                  'ruleId': cve_id,
                                  'message': {'text': cve_id + ' in ' + pkg + ' ' + info.get('range','')},
                                  'level': level,
                                  'locations': [{'physicalLocation': {'artifactLocation': {'uri': 'package.json'}}}],
                                  'properties': {'package': pkg, 'version': info.get('range',''), 'severity': severity}
                              })
              sarif = {
                  'version': '2.1.0',
                  '\$schema': 'https://json.schemastore.org/sarif-2.1.0.json',
                  'runs': [{
                      'tool': {'driver': {'name': 'npm audit', 'version': '1.0', 'informationUri': 'https://docs.npmjs.com/cli/v10/commands/npm-audit'}},
                      'results': results
                  }]
              }
              with open('npm-audit-results.sarif', 'w') as f:
                  json.dump(sarif, f, indent=2)
              print(f'npm-audit-results.sarif written with {len(results)} findings')
          except Exception as e:
              print(f'npm-audit SARIF conversion error: {e}', file=sys.stderr)
              import traceback; traceback.print_exc()
              sys.exit(0)
          "
        continue-on-error: true

      - name: Ensure npm-audit-results.sarif exists (fallback for 0 findings)
        if: always()
        run: |
          if [ ! -s npm-audit-results.sarif ]; then
            echo "::notice::npm audit found 0 findings. Generating empty SARIF to satisfy upload-sarif."
            printf '%s\n' \
              '{' \
              '  "version": "2.1.0",' \
              '  "$schema": "https://json.schemastore.org/sarif-2.1.0.json",' \
              '  "runs": [' \
              '    {' \
              '      "tool": {' \
              '        "driver": {' \
              '          "name": "npm audit",' \
              '          "version": "1.0",' \
              '          "informationUri": "https://docs.npmjs.com/cli/v10/commands/npm-audit"' \
              '        }' \
              '      },' \
              '      "results": []' \
              '    }' \
              '  ]' \
              '}' > npm-audit-results.sarif
          fi
          echo "✓ npm-audit-results.sarif size: $(stat -c%s npm-audit-results.sarif) bytes"

      - name: Upload npm audit SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
        with:
          sarif_file: npm-audit-results.sarif
          category: npm-audit

      - name: Upload npm audit SARIF as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: npm-audit-sarif-${{ github.sha }}
          path: npm-audit-results.sarif
          if-no-files-found: warn
          retention-days: 30

      - name: Evaluate dependency-scan findings
        if: always()
        run: |
          echo '## Dependency Scan Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '- npm audit: '"${{ steps.npm-audit.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo '- trivy fs: '"${{ steps.trivy-fs.outcome }}" >> "$GITHUB_STEP_SUMMARY"

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run Gitleaks (SARIF output)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_FORMAT: sarif
          GITLEAKS_REPORT_PATH: gitleaks-results.sarif
        continue-on-error: true

      - name: Ensure gitleaks-results.sarif exists (fallback for 0 findings)
        if: always()
        run: |
          if [ ! -s gitleaks-results.sarif ]; then
            echo "::notice::Gitleaks found 0 findings. Generating empty SARIF to satisfy upload-sarif."
            printf '%s\n' \
              '{' \
              '  "version": "2.1.0",' \
              '  "$schema": "https://json.schemastore.org/sarif-2.1.0.json",' \
              '  "runs": [' \
              '    {' \
              '      "tool": {' \
              '        "driver": {' \
              '          "name": "Gitleaks",' \
              '          "version": "8.18.0",' \
              '          "informationUri": "https://gitleaks.io"' \
              '        }' \
              '      },' \
              '      "results": []' \
              '    }' \
              '  ]' \
              '}' > gitleaks-results.sarif
          fi
          echo "✓ gitleaks-results.sarif size: $(stat -c%s gitleaks-results.sarif) bytes"

      - name: Upload Gitleaks SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks

      - name: Upload Gitleaks SARIF as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: gitleaks-sarif-${{ github.sha }}
          path: gitleaks-results.sarif
          if-no-files-found: warn
          retention-days: 30

  container-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Analyze Dockerfile for security misconfigurations
        if: hashFiles('**/Dockerfile') != ''
        run: |
          echo '## Dockerfile Security Checks' >> "$GITHUB_STEP_SUMMARY"
          issues=0
          for df in $(find . -name Dockerfile -not -path './.git/*' 2>/dev/null); do
            echo "Analyzing $df..."
            # Check: run as non-root user
            if ! grep -qE '^USER ' "$df"; then
              echo "::warning file=$df::Missing USER instruction — container runs as root"
              echo "- \`$df\`: Missing USER instruction (runs as root)" >> "$GITHUB_STEP_SUMMARY"
              issues=$((issues+1))
            elif grep -qE '^USER root' "$df"; then
              echo "::warning file=$df::USER root detected — should use non-root user"
              echo "- \`$df\`: USER root (use non-root)" >> "$GITHUB_STEP_SUMMARY"
              issues=$((issues+1))
            fi
            # Check: base image pinned by digest
            base=$(grep -m1 '^FROM ' "$df" | sed 's/FROM //' | awk '{print $1}')
            if echo "$base" | grep -qE '@sha256:'; then
              echo "  Base image pinned: $base"
            elif [ -n "$base" ] && echo "$base" | grep -qE ':latest$|^[^:]*$'; then
              echo "::warning file=$df::Base image $base not pinned by digest — supply@sha256:..."
              echo "- \`$df\`: Base image \`$base\` not pinned by digest" >> "$GITHUB_STEP_SUMMARY"
              issues=$((issues+1))
            fi
            # Check: expose patterns
            if grep -qE '^EXPOSE [0-9]+-[0-9]+' "$df"; then
              echo "::warning file=$df::EXPOSE with port range detected — limit to specific ports"
              echo "- \`$df\`: EXPOSE port range (limit to specific ports)" >> "$GITHUB_STEP_SUMMARY"
              issues=$((issues+1))
            fi
          done
          echo "Dockerfile checks complete: $issues issue(s)" >> "$GITHUB_STEP_SUMMARY"
        continue-on-error: true

      - name: Build Docker image
        run: docker build -t app:ci-${{ github.sha }} .
        continue-on-error: true

      - name: Run Trivy DB update
        run: docker run --rm aquasec/trivy:0.65.0 image --download-db-only
        continue-on-error: true

      - name: Scan image with Trivy (SARIF output)
        id: trivy-image
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        with:
          image-ref: 'app:ci-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'HIGH,CRITICAL'
        continue-on-error: true

      - name: Ensure trivy-image-results.sarif exists (fallback for 0 findings)
        if: always()
        run: |
          if [ ! -s trivy-image-results.sarif ]; then
            echo "::notice::Trivy Image found 0 findings. Generating empty SARIF to satisfy upload-sarif."
            printf '%s\n' \
              '{' \
              '  "version": "2.1.0",' \
              '  "$schema": "https://json.schemastore.org/sarif-2.1.0.json",' \
              '  "runs": [' \
              '    {' \
              '      "tool": {' \
              '        "driver": {' \
              '          "name": "Trivy Image",' \
              '          "version": "0.65.0",' \
              '          "informationUri": "https://aquasecurity.github.io/trivy/"' \
              '        }' \
              '      },' \
              '      "results": []' \
              '    }' \
              '  ]' \
              '}' > trivy-image-results.sarif
          fi
          echo "✓ trivy-image-results.sarif size: $(stat -c%s trivy-image-results.sarif) bytes"

      - name: Upload Trivy image SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      - name: Upload Trivy image SARIF as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: trivy-image-results-${{ github.sha }}
          path: trivy-image-results.sarif
          if-no-files-found: warn
          retention-days: 30
