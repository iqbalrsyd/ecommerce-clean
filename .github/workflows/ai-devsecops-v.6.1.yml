name: Test SARIF Upload (manual trigger)
on:
  workflow_dispatch:    # Trigger manual, tidak ganggu PR/push biasa
  push:
    branches: [master, main]
    paths:
      - '.github/workflows/test-sarif.yml'

permissions:
  contents: read
  security-events: write

jobs:
  sast:
    name: SAST Scan (Semgrep via docker)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      # Semgrep action.yml v1 HANYA punya 2 input: config, publishToken.
      # `output_format` di-ignore. Pakai docker run langsung.
      - name: Run Semgrep (SARIF output via docker)
        run: |
          docker run --rm -v "$PWD:/src:ro" returntocorp/semgrep:1.99.0 \
            semgrep --config=p/owasp-top-ten \
                    --config=p/javascript \
                    --config=p/nodejs \
                    --config=p/expressjs \
                    --config=p/sql-injection \
                    --config=p/secrets \
                    --config=p/dockerfile \
                    --sarif \
                    --output=semgrep-results.sarif \
                    --timeout=600 \
                    /src
        continue-on-error: true

      - name: Verify Semgrep SARIF file
        if: always()
        run: |
          if [ -s semgrep-results.sarif ]; then
            echo "✓ Semgrep SARIF file generated, size: $(stat -c%s semgrep-results.sarif) bytes"
          else
            echo "::error::Semgrep SARIF file missing or empty"
            exit 1
          fi

      - name: Upload Semgrep SARIF to GitHub Code Scanning
        if: always() && hashFiles('semgrep-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@8272c299f21ca24af15dfe9ac0971ba969e5e0d5
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Upload Semgrep SARIF as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: semgrep-results-${{ github.sha }}
          path: semgrep-results.sarif
          if-no-files-found: warn
          retention-days: 30

  dependency-scan:
    name: Dependency CVE Scan (Trivy fs SARIF)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Install (for npm audit)
        run: npm install --no-audit --no-fund --ignore-scripts
        continue-on-error: true

      - name: npm audit
        id: npm-audit
        run: npm audit --audit-level=high --json > npm-audit-results.json || true
        continue-on-error: true

      - name: Run Trivy filesystem scan (SARIF output)
        id: trivy-fs
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'   # FIX: Trivy exit 0 walaupun ada CVE, biar SARIF file ter-create
        continue-on-error: true

      - name: Verify Trivy fs SARIF file
        if: always()
        run: |
          if [ -s trivy-fs-results.sarif ]; then
            echo "✓ Trivy fs SARIF generated, size: $(stat -c%s trivy-fs-results.sarif) bytes"
            echo "=== First 3 lines (preview) ==="
            head -3 trivy-fs-results.sarif
          else
            echo "::error::Trivy fs SARIF file missing or empty"
            exit 1
          fi

      - name: Upload Trivy fs SARIF to GitHub Code Scanning
        if: always() && hashFiles('trivy-fs-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@8272c299f21ca24af15dfe9ac0971ba969e5e0d5
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

      - name: Upload Trivy fs SARIF as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: trivy-fs-results-${{ github.sha }}
          path: trivy-fs-results.sarif
          if-no-files-found: warn
          retention-days: 30

      - name: Upload npm audit JSON as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: npm-audit-results-${{ github.sha }}
          path: npm-audit-results.json
          if-no-files-found: warn
          retention-days: 30

      - name: Evaluate dependency-scan findings
        if: always()
        run: |
          echo "## Dependency Scan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- npm audit outcome: ${{ steps.npm-audit.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- trivy fs outcome: ${{ steps.trivy-fs.outcome }}" >> "$GITHUB_STEP_SUMMARY"

  container-scan:
    name: Container Image Scan (Trivy image SARIF)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Check Dockerfile exists
        id: df-check
        run: |
          if [ -f "Dockerfile" ]; then
            echo "has_dockerfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dockerfile=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Dockerfile tidak ditemukan, melewati container scan."
          fi

      - name: Build Docker image
        if: steps.df-check.outputs.has_dockerfile == 'true'
        run: docker build -t app:ci-${{ github.sha }} .
        continue-on-error: true

      - name: Trivy image scan (SARIF)
        if: steps.df-check.outputs.has_dockerfile == 'true'
        id: trivy-image
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        with:
          image-ref: 'app:ci-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          exit-code: '0'   # FIX: sama seperti fs
        continue-on-error: true

      - name: Verify Trivy image SARIF file
        if: always()
        run: |
          if [ -s trivy-image-results.sarif ]; then
            echo "✓ Trivy image SARIF generated, size: $(stat -c%s trivy-image-results.sarif) bytes"
          else
            echo "::warning::Trivy image SARIF file missing or empty (image may not have been built)"
          fi

      - name: Upload Trivy image SARIF to GitHub Code Scanning
        if: always() && hashFiles('trivy-image-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@8272c299f21ca24af15dfe9ac0971ba969e5e0d5
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      - name: Upload Trivy image SARIF as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: trivy-image-results-${{ github.sha }}
          path: trivy-image-results.sarif
          if-no-files-found: warn
          retention-days: 30
