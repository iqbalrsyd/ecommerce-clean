name: "AI DevSecOps \u2014 Domain Compliance (e-commerce)"
'on':
  workflow_call:
    inputs:
      detected_domain:
        description: Domain classification from the AI agent.
        required: false
        type: string
        default: e-commerce
permissions:
  contents: read
  security-events: write
jobs:
  jwt-bcrypt-config-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    needs:
    - sast
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: scan-jwt-and-bcrypt-misconfigs
      run: "set -e\n# 1. Detect hardcoded JWT secret literals in source\nif grep -rEn\
        \ \"(JWT_SECRET|jwtSecret|jwt_secret)\\s*[:=]\\s*['\\\"][A-Za-z0-9_\\-]{8,}['\\\
        \"]\" --include='*.js' --exclude-dir=node_modules .; then\n  echo \"FAIL:\
        \ hardcoded JWT secret literal detected\"\n  exit 1\nfi\n# 2. Detect jwt.sign()\
        \ calls that lack an expiresIn option\nSIGNS=$(grep -rEn \"jwt\\.sign\\s*\\\
        (\" --include='*.js' --exclude-dir=node_modules . || true)\nif [ -n \"$SIGNS\"\
        \ ]; then\n  echo \"$SIGNS\" | while IFS= read -r line; do\n    if ! echo\
        \ \"$line\" | grep -qE \"expiresIn|expires_in\"; then\n      echo \"FAIL:\
        \ jwt.sign() without expiresIn -> $line\"\n      exit 1\n    fi\n  done\n\
        fi\n# 3. Detect bcrypt.hash/hashSync with cost factor < 12\nif grep -rEn \"\
        bcrypt\\.(hash|hashSync)\\s*\\([^,]+,\\s*(8|9|10|11)\\b\" --include='*.js'\
        \ --exclude-dir=node_modules .; then\n  echo \"FAIL: bcrypt cost factor below\
        \ 12 detected\"\n  exit 1\nfi\necho \"OK: jwt/bcrypt config patterns passed\"\
        \n"
    - name: semgrep-bcrypt-low-cost
      run: "echo 'AI-designed Semgrep rule (id=ai-rule):'\necho 'Rule body:'\ncat\
        \ <<'SEMGREP_EOF' | sed 's/^/  /'\nrules:\n  - id: bcrypt-cost-factor-below-12\n\
        \    patterns:\n      - pattern-either:\n          - pattern: bcrypt.hash($P,\
        \ $COST)\n          - pattern: bcrypt.hashSync($P, $COST)\n      - metavariable-comparison:\n\
        \          metavariable: $COST\n          comparison: $COST < 12\n    message:\
        \ >-\n      bcrypt cost factor is below 12. E-commerce auth endpoints (login,\
        \ signup)\n      should use cost >= 12 to resist offline brute-force on the\
        \ order/customer\n      credential database.\n    severity: ERROR\n    metadata:\n\
        \      cwe: \"CWE-916: Use of Password Hash With Insufficient Computational\
        \ Effort\"\n      owasp: \"A02:2021 - Cryptographic Failures\"\n    languages:\
        \ [javascript]\nSEMGREP_EOF\n"
    - name: Ensure auth-config-audit-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s auth-config-audit-results.sarif ]; then\n  echo \"::notice::auth-config-audit\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"auth-config-audit\",' \\\n    '      \
        \    \"version\": \"0.65.0\",' \\\n    '          \"informationUri\": \"https://aquasecurity.github.io/trivy/\"\
        ' \\\n    '        }' \\\n    '      },' \\\n    '      \"results\": []' \\\
        \n    '    }' \\\n    '  ]' \\\n    '}' > auth-config-audit-results.sarif\n\
        fi\necho \"\u2713 auth-config-audit-results.sarif size: $(stat -c%s auth-config-audit-results.sarif)\
        \ bytes\"\n"
    - name: Upload auth-config-audit SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: auth-config-audit-results.sarif
        category: auth-config-audit
  checkout-orders-route-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    needs:
    - sast
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: verify-auth-mw-on-sensitive-routes
      run: "set -e\nFAIL=0\nfor f in routes/checkout.js routes/orders.js; do\n  if\
        \ [ ! -f \"$f\" ]; then\n    echo \"WARN: $f not found, skipping\"\n    continue\n\
        \  fi\n  # Look for any handler registration on /checkout or /orders that\
        \ does NOT pass an auth-ish middleware\n  bad=$(grep -nE \"(router|app)\\\
        .(post|put|patch|delete)\\s*\\(\\s*['\\\"]/(checkout|orders)(/|['\\\"])\"\
        \ \"$f\" \\\n        | grep -ivE \"(auth|verify|protect|isAuthenticated|requireAuth|jwt|middleware)\"\
        \ || true)\n  if [ -n \"$bad\" ]; then\n    echo \"FAIL: $f registers a sensitive\
        \ handler without an obvious auth middleware:\"\n    echo \"$bad\"\n    FAIL=1\n\
        \  fi\ndone\nif [ \"$FAIL\" -ne 0 ]; then exit 1; fi\necho \"OK: all /checkout\
        \ and /orders handlers are gated by an auth middleware\"\n"
    - name: semgrep-order-mass-assign
      run: "echo 'AI-designed Semgrep rule (id=ai-rule):'\necho 'Rule body:'\ncat\
        \ <<'SEMGREP_EOF' | sed 's/^/  /'\nrules:\n  - id: order-mass-assignment-from-req-body\n\
        \    patterns:\n      - pattern-either:\n          - pattern: |\n        \
        \      $MODEL.totalPrice = $REQ.body.$X\n          - pattern: |\n        \
        \      $MODEL.total = $REQ.body.$X\n          - pattern: |\n             \
        \ $MODEL.price = $REQ.body.$X\n          - pattern: |\n              $MODEL.userId\
        \ = $REQ.body.$X\n          - pattern: |\n              $MODEL.status = $REQ.body.$X\n\
        \    message: >-\n      Order model field is assigned directly from req.body.\
        \ In this e-commerce\n      API the authoritative totalPrice/price/userId/status\
        \ must be derived\n      server-side from the cart lookup and the authenticated\
        \ JWT, never from\n      client input.\n    severity: ERROR\n    metadata:\n\
        \      cwe: \"CWE-915: Improperly Controlled Modification of Dynamically-Determined\
        \ Object Attributes\"\n      owasp: \"A08:2021 - Software and Data Integrity\
        \ Failures\"\n    languages: [javascript]\nSEMGREP_EOF\n"
    - name: Ensure route-guard-audit-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s route-guard-audit-results.sarif ]; then\n  echo \"::notice::route-guard-audit\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"route-guard-audit\",' \\\n    '      \
        \    \"version\": \"0.65.0\",' \\\n    '          \"informationUri\": \"https://aquasecurity.github.io/trivy/\"\
        ' \\\n    '        }' \\\n    '      },' \\\n    '      \"results\": []' \\\
        \n    '    }' \\\n    '  ]' \\\n    '}' > route-guard-audit-results.sarif\n\
        fi\necho \"\u2713 route-guard-audit-results.sarif size: $(stat -c%s route-guard-audit-results.sarif)\
        \ bytes\"\n"
    - name: Upload route-guard-audit SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: route-guard-audit-results.sarif
        category: route-guard-audit
  ecommerce-payment-stripe-webhook-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    needs:
    - sast
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: scan-stripe-webhook-handler
      run: "set -e\nfail=0\n# Check webhook handler exists\nif ! grep -rnE 'stripe\\\
        .webhooks\\.constructEvent' src/ 2>/dev/null | grep -q .; then\n  echo '::error\
        \ file=src/routes/webhook.js::Stripe webhook signature not verified \u2014\
        \ use stripe.webhooks.constructEvent()'\n  fail=1\nfi\n# Check Stripe API\
        \ key loaded from env, not hardcoded\nif grep -rnE 'sk_(live|test)_[A-Za-z0-9]{20,}'\
        \ src/ 2>/dev/null | grep -v process.env | grep -q .; then\n  echo '::error\
        \ file=src/config/stripe.js::Hardcoded Stripe key found in source \u2014 move\
        \ to process.env.STRIPE_SECRET_KEY'\n  fail=1\nfi\nexit $fail\n"
    - name: Ensure ecommerce-payment-stripe-webhook-results.sarif exists (fallback
        for 0 findings)
      if: always()
      run: "if [ ! -s ecommerce-payment-stripe-webhook-results.sarif ]; then\n  echo\
        \ \"::notice::ecommerce-payment-stripe-webhook found 0 findings. Generating\
        \ empty SARIF to satisfy upload-sarif.\"\n  printf '%s\\n' \\\n    '{' \\\n\
        \    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\": \"https://json.schemastore.org/sarif-2.1.0.json\"\
        ,' \\\n    '  \"runs\": [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n\
        \    '        \"driver\": {' \\\n    '          \"name\": \"ecommerce-payment-stripe-webhook\"\
        ,' \\\n    '          \"version\": \"0.65.0\",' \\\n    '          \"informationUri\"\
        : \"https://aquasecurity.github.io/trivy/\"' \\\n    '        }' \\\n    '\
        \      },' \\\n    '      \"results\": []' \\\n    '    }' \\\n    '  ]' \\\
        \n    '}' > ecommerce-payment-stripe-webhook-results.sarif\nfi\necho \"\u2713\
        \ ecommerce-payment-stripe-webhook-results.sarif size: $(stat -c%s ecommerce-payment-stripe-webhook-results.sarif)\
        \ bytes\"\n"
    - name: Upload ecommerce-payment-stripe-webhook SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: ecommerce-payment-stripe-webhook-results.sarif
        category: ecommerce-payment-stripe-webhook
  ecommerce-cart-bola-ownership:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    needs:
    - sast
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: scan-cart-order-ownership
      run: "set -e\nfail=0\n# Find GET /cart/:id or GET /orders/:id routes\nfor route\
        \ in cart orders; do\n  if grep -rnE \"router\\.(get|post)\\s*\\(\\s*['\\\"\
        ]\\/?$route\\/:id\" src/ 2>/dev/null | grep -q .; then\n    # Check if ownership\
        \ verification is present in same file\n    if ! grep -rnE '(req\\.user\\\
        .id|userId|ownerId|verifyOwnership)' src/routes/$route.js 2>/dev/null | grep\
        \ -q .; then\n      echo \"::error file=src/routes/$route.js::$route route\
        \ uses :id parameter without ownership verification \u2014 vulnerable to BOLA/IDOR\"\
        \n      fail=1\n    fi\n  fi\ndone\nexit $fail\n"
    - name: Ensure ecommerce-cart-bola-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s ecommerce-cart-bola-results.sarif ]; then\n  echo \"::notice::ecommerce-cart-bola\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"ecommerce-cart-bola\",' \\\n    '    \
        \      \"version\": \"0.65.0\",' \\\n    '          \"informationUri\": \"\
        https://aquasecurity.github.io/trivy/\"' \\\n    '        }' \\\n    '   \
        \   },' \\\n    '      \"results\": []' \\\n    '    }' \\\n    '  ]' \\\n\
        \    '}' > ecommerce-cart-bola-results.sarif\nfi\necho \"\u2713 ecommerce-cart-bola-results.sarif\
        \ size: $(stat -c%s ecommerce-cart-bola-results.sarif) bytes\"\n"
    - name: Upload ecommerce-cart-bola SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: ecommerce-cart-bola-results.sarif
        category: ecommerce-cart-bola
  ecommerce-checkout-price-server-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    needs:
    - sast
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: scan-checkout-price-from-body
      run: "set -e\nfail=0\n# Look for direct req.body.price/amount usage in checkout\
        \ logic\nif grep -rnE 'req\\.body\\.(price|amount|total|grand_total)' src/routes/checkout.js\
        \ src/controllers/checkout.js 2>/dev/null | grep -q .; then\n  echo '::error\
        \ file=src/routes/checkout.js::Price/amount read from req.body \u2014 fetch\
        \ from DB (Product.findById(id).price) instead'\n  fail=1\nfi\nexit $fail\n"
    - name: Ensure ecommerce-checkout-price-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s ecommerce-checkout-price-results.sarif ]; then\n  echo \"::notice::ecommerce-checkout-price\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"ecommerce-checkout-price\",' \\\n    '\
        \          \"version\": \"0.65.0\",' \\\n    '          \"informationUri\"\
        : \"https://aquasecurity.github.io/trivy/\"' \\\n    '        }' \\\n    '\
        \      },' \\\n    '      \"results\": []' \\\n    '    }' \\\n    '  ]' \\\
        \n    '}' > ecommerce-checkout-price-results.sarif\nfi\necho \"\u2713 ecommerce-checkout-price-results.sarif\
        \ size: $(stat -c%s ecommerce-checkout-price-results.sarif) bytes\"\n"
    - name: Upload ecommerce-checkout-price SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: ecommerce-checkout-price-results.sarif
        category: ecommerce-checkout-price
