name: "AI DevSecOps \u2014 Domain Compliance (e-commerce)"
'on':
  workflow_call:
    inputs:
      detected_domain:
        description: Domain classification from the AI agent.
        required: false
        type: string
        default: e-commerce
permissions:
  contents: read
  security-events: write
jobs:
  pci-dss:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
        fetch-depth: 0
    - name: Semgrep (e-commerce / payment-security ruleset) docker run --rm \ -v "${{
        github.workspace }}:/src:ro" \ -v "${{ github.workspace }}:/out" \ returntocorp/semgrep:1.99.0
        \ semgrep \ --config=/src/.semgrep/ecommerce.yml \ --config=/src/.semgrep/pci-dss.yml
        \ --config=/src/.semgrep/owasp-api.yml \ --config=p/owasp-top-ten \ --config=p/javascript
        \ --config=p/nodejs \ --config=p/expressjs \ --config=p/sql-injection \ --config=p/secrets
        \ --config=p/typescript \ --config=p/security-audit \ --sarif --output=/out/pci-dss-semgrep.sarif
        \ --timeout=300 --no-error /src
      continue-on-error: true
    - name: Scan for hardcoded PAN/CVV in source
      run: "PAN_PATTERN='\\b(4[0-9]{12}([0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|6(011|5[0-9]{2})[0-9]{12})\\\
        b'\nCVV_PATTERN='(?i)cvv[\\\"\\\\s:=]+[0-9]{3,4}'\nrm -f pci-findings.txt\n\
        touch pci-findings.txt\ngrep -rE \"${PAN_PATTERN}\" --include='*.js' --include='*.ts'\
        \ --include='*.py' src/ 2>/dev/null \\\n  | head -20 | awk -F: '{printf \"\
        PAN|%s|%s|%s\\n\",$1,$2,$3}' >> pci-findings.txt\ngrep -rE \"${CVV_PATTERN}\"\
        \ --include='*.js' --include='*.ts' --include='*.py' src/ 2>/dev/null \\\n\
        \  | head -20 | awk -F: '{printf \"CVV|%s|%s|%s\\n\",$1,$2,$3}' >> pci-findings.txt\n\
        if [ -s pci-findings.txt ]; then\n  echo \"::error::Found $(wc -l < pci-findings.txt)\
        \ potential PCI-DSS violation(s):\"\n  cat pci-findings.txt\nelse\n  echo\
        \ '\u2713 No hardcoded PAN/CVV detected'\nfi\n"
      continue-on-error: true
    - name: Validate .env not in git history
      run: "if git log --all --full-history -- '.env' 2>/dev/null | grep -q commit;\
        \ then\n  echo '::error::.env file found in git history. Rotate all secrets!'\n\
        \  git log --all --full-history -- '.env' --oneline | head -5\nelse\n  echo\
        \ '\u2713 .env not in git history'\nfi\n"
      continue-on-error: true
    - name: Generate PCI-DSS audit SARIF from findings
      if: always()
      run: "python3 - <<'PY'\nimport json, os, pathlib\nfindings = []\n\n# 1. PAN/CVV\
        \ findings (custom regex script above).\nf = pathlib.Path('pci-findings.txt')\n\
        if f.exists():\n    for line in f.read_text().splitlines():\n        parts\
        \ = line.split('|', 4)\n        if len(parts) < 5:\n            continue\n\
        \        kind, file_path, line_no, snippet = parts\n        rule = 'pci-dss-pan-in-source'\
        \ if kind == 'PAN' else 'pci-dss-cvv-in-source'\n        findings.append({\n\
        \            'ruleId': rule,\n            'level': 'error',\n            'message':\
        \ {'text': f'PCI-DSS {kind} detected in source code. Cardholder data must\
        \ never be committed.'},\n            'locations': [{\n                'physicalLocation':\
        \ {\n                    'artifactLocation': {'uri': file_path},\n       \
        \             'region': {'startLine': int(line_no) if line_no.isdigit() else\
        \ 1},\n                },\n            }],\n            'properties': {'security-severity':\
        \ '9.5'},\n        })\n\n# 2. Semgrep findings (e-commerce / payment-security\n\
        # ruleset from .github/ai-devsecops-rules.yml or\n# the registry rulesets\
        \ p/owasp-top-ten, p/javascript,\n# p/sql-injection, etc.). De-duplicate by\
        \ (ruleId,\n# uri, startLine) and emit everything under a single\n# 'pci-dss-audit'\
        \ run for the Code Scanning tab.\nseen = {(\n    r['ruleId'],\n    (r.get('locations')\
        \ or [{}])[0].get('physicalLocation', {}).get('artifactLocation', {}).get('uri',\
        \ ''),\n    (r.get('locations') or [{}])[0].get('physicalLocation', {}).get('region',\
        \ {}).get('startLine', 0),\n) for r in findings}\nsemgrep_sarif = pathlib.Path('pci-dss-semgrep.sarif')\n\
        if semgrep_sarif.exists():\n    try:\n        sg = json.loads(semgrep_sarif.read_text())\n\
        \        for run in sg.get('runs') or []:\n            for r in run.get('results')\
        \ or []:\n                rid = r.get('ruleId', 'semgrep-unknown')\n     \
        \           loc = (r.get('locations') or [{}])[0].get('physicalLocation',\
        \ {})\n                uri = (loc.get('artifactLocation') or {}).get('uri',\
        \ '')\n                start_line = (loc.get('region') or {}).get('startLine',\
        \ 0)\n                key = (rid, uri, start_line)\n                if key\
        \ in seen:\n                    continue\n                seen.add(key)\n\
        \                findings.append({\n                    'ruleId': rid,\n \
        \                   'level': r.get('level', 'warning'),\n                \
        \    'message': r.get('message', {'text': rid}),\n                    'locations':\
        \ r.get('locations', []),\n                    'properties': r.get('properties',\
        \ {}),\n                })\n    except Exception as e:\n        print(f'Could\
        \ not parse Semgrep SARIF: {e}')\n\nsarif = {\n    'version': '2.1.0',\n \
        \   '$schema': 'https://json.schemastore.org/sarif-2.1.0.json',\n    'runs':\
        \ [{\n        'tool': {'driver': {\n            'name': 'pci-dss-audit',\n\
        \            'version': '1.0',\n            'informationUri': 'https://www.pcisecuritystandards.org/',\n\
        \        }},\n        'results': findings,\n    }],\n}\npathlib.Path('pci-dss-audit.sarif').write_text(json.dumps(sarif,\
        \ indent=2))\nprint(f'Generated SARIF with {len(findings)} finding(s) (PAN/CVV\
        \ + Semgrep)')\nPY\necho \"\u2713 pci-dss-audit.sarif size: $(stat -c%s pci-dss-audit.sarif)\
        \ bytes\"\n"
    - name: Ensure pci-dss-audit.sarif exists (fallback for 0 findings or scan error)
      if: always()
      run: "if [ ! -s pci-dss-audit.sarif ]; then\n  echo '::notice::pci-dss-audit\
        \ did not produce a SARIF file. Generating empty SARIF to satisfy upload-sarif.'\n\
        \  printf '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n   \
        \ '  \"$schema\": \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n\
        \    '  \"runs\": [{' \\\n    '    {' \\\n    '      \"tool\": {' \\\n   \
        \ '        \"driver\": {' \\\n    '          \"name\": \"pci-dss-audit\",'\
        \ \\\n    '          \"version\": \"1.0\",' \\\n    '          \"informationUri\"\
        : \"https://www.pcisecuritystandards.org/\"' \\\n    '        }' \\\n    '\
        \      },' \\\n    '      \"results\": []' \\\n    '    }' \\\n    '  ]' \\\
        \n    '}' > pci-dss-audit.sarif\nfi\necho \"\u2713 pci-dss-audit.sarif size:\
        \ $(stat -c%s pci-dss-audit.sarif) bytes\"\n"
    - name: Upload devsecops-pci-dss SARIF to Code Scanning
      if: always() && hashFiles('pci-dss-audit.sarif') != ''
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: pci-dss-audit.sarif
        category: devsecops-pci-dss
    - name: Upload pci-dss-audit SARIF as artifact
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: pci-dss-audit-${{ github.sha }}
        path: pci-dss-audit.sarif
        if-no-files-found: warn
        retention-days: 30
