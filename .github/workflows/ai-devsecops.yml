name: CI DevSecOps (javascript)
'on':
  push:
    branches:
    - main
    - master
    - develop
  pull_request:
    branches:
    - main
    - master
    - develop
  workflow_dispatch: null
permissions:
  contents: read
  pull-requests: read
  security-events: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: '20'
        cache: npm
    - name: Install dependencies
      run: npm ci --no-audit --no-fund
      continue-on-error: true
    - name: Run ESLint
      run: "if [ -f package.json ] && grep -q '\"lint\"' package.json; then\n  npm\
        \ run lint --if-present\nelse\n  echo 'No lint script defined; skipping.'\n\
        fi\n"
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: '20'
        cache: npm
    - name: Install dependencies
      run: npm ci --no-audit --no-fund
      continue-on-error: true
    - name: Run tests
      run: npm test --if-present || true
  sast:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: Run semgrep (registry + inline custom rules, SARIF output)
      run: "# Single Semgrep invocation: registry rules via --config=p/...,\n# custom\
        \ domain/coverage/AI-generated rules via a temp file mounted\n# read-only\
        \ into the container (--config=/rules/ai-devsecops.yml).\n# No double config,\
        \ no separate rules file required in the target repo.\ncat > /tmp/ai-devsecops-rules.yml\
        \ <<'SEMGREP_EOF'\nrules:\n- id: api-bola-missing-ownership-check\n  languages:\n\
        \  - javascript\n  - typescript\n  severity: ERROR\n  message: Endpoint menerima\
        \ object ID (e.g. :id, :orderId, :userId) dari URL tapi\n    tidak verify\
        \ ownership. Attacker bisa akses resource user lain dengan iterasi\n    ID.\
        \ OWASP API1:2023.\n  metadata:\n    cwe: 'CWE-639: Authorization Bypass Through\
        \ User-Controlled Key'\n    owasp-api: API1:2023 Broken Object Level Authorization\n\
        \    ai-devsecops-source: owasp-api.yml\n  patterns:\n  - pattern-either:\n\
        \    - pattern: '$APP.$METHOD(\"/$P/:id\", $H)\n\n        '\n    - pattern:\
        \ 'router.$METHOD(\"/$P/:id\", $H)\n\n        '\n    - pattern: '$APP.$METHOD(\"\
        /$P/:userId\", $H)\n\n        '\n    - pattern: '$APP.$METHOD(\"/$P/:orderId\"\
        , $H)\n\n        '\n- id: api-auth-bcrypt-missing-rounds\n  languages:\n \
        \ - javascript\n  - typescript\n  - python\n  severity: WARNING\n  message:\
        \ bcrypt dengan rounds < 10 tidak cukup. Pakai rounds >= 12 untuk production\n\
        \    (OWASP recommendation). OWASP API2:2023.\n  metadata:\n    cwe: 'CWE-916:\
        \ Use of Password Hash With Insufficient Computational Effort'\n    owasp-api:\
        \ API2:2023 Broken Authentication\n    ai-devsecops-source: owasp-api.yml\n\
        \  pattern-regex: bcrypt\\.(?:hash|hashSync)\\s*\\(\\s*[^,]+,\\s*([0-9]+|saltRounds\\\
        s*:\\s*([0-9]+))\\s*\\)\n- id: api-auth-no-rate-limit-on-login\n  languages:\n\
        \  - javascript\n  - typescript\n  - python\n  severity: WARNING\n  message:\
        \ Endpoint /login atau /auth/login tidak pakai rate limiting. Attacker bisa\n\
        \    brute-force password. Pakai express-rate-limit atau library serupa. OWASP\
        \ API2:2023\n    + API4:2023.\n  metadata:\n    cwe: 'CWE-307: Improper Restriction\
        \ of Excessive Authentication Attempts'\n    owasp-api: API2:2023 Broken Authentication\n\
        \    owasp-api-2: API4:2023 Unrestricted Resource Consumption\n    ai-devsecops-source:\
        \ owasp-api.yml\n  patterns:\n  - pattern-either:\n    - pattern: '$APP.post(\"\
        /login\", $H)\n\n        '\n    - pattern: '$APP.post(\"/auth/login\", $H)\n\
        \n        '\n    - pattern: '$APP.post(\"/api/login\", $H)\n\n        '\n\
        \  - pattern-not: '$APP.post(\"/login\", rateLimit, $H)\n\n      '\n  - pattern-not:\
        \ '$APP.post(\"/auth/login\", rateLimit, $H)\n\n      '\n- id: api-mass-assignment-spread-body\n\
        \  languages:\n  - javascript\n  - typescript\n  severity: ERROR\n  message:\
        \ Spread `req.body` ke object user/model. Attacker bisa tambah field privilege\n\
        \    (is_admin, role) dan escalate. Whitelist allowed fields. OWASP API3:2023.\n\
        \  metadata:\n    cwe: 'CWE-915: Improperly Controlled Modification of Dynamically-Determined\
        \ Object\n      Attributes'\n    owasp-api: API3:2023 Broken Object Property\
        \ Level Authorization\n    ai-devsecops-source: owasp-api.yml\n  patterns:\n\
        \  - pattern-either:\n    - pattern: '$MODEL.create({...$REQ.body})\n\n  \
        \      '\n    - pattern: '$MODEL.update({...$REQ.body})\n\n        '\n- id:\
        \ api-excessive-data-exposure\n  languages:\n  - javascript\n  - typescript\n\
        \  severity: WARNING\n  message: Response kirim semua field model ke client.\
        \ Field sensitif (password hash,\n    internal flag, PII) bisa terekspos.\
        \ Whitelist field yang dikembalikan. OWASP API3:2023.\n  metadata:\n    cwe:\
        \ 'CWE-213: Exposure of Sensitive Information Due to Incompatible Policies'\n\
        \    owasp-api: API3:2023 Broken Object Property Level Authorization\n   \
        \ ai-devsecops-source: owasp-api.yml\n  patterns:\n  - pattern-either:\n \
        \   - pattern: 'res.json($USER)\n\n        '\n    - pattern: 'res.json($MODEL.toJSON())\n\
        \n        '\n    - pattern: 'res.json({user: $USER})\n\n        '\n- id: api-no-pagination\n\
        \  languages:\n  - javascript\n  - typescript\n  - python\n  severity: WARNING\n\
        \  message: Endpoint return list tanpa pagination. Attacker bisa fetch semua\
        \ data sekaligus\n    (DoS / data exfiltration). Pakai limit/offset atau cursor.\
        \ OWASP API4:2023.\n  metadata:\n    cwe: 'CWE-770: Allocation of Resources\
        \ Without Limits or Throttling'\n    owasp-api: API4:2023 Unrestricted Resource\
        \ Consumption\n    ai-devsecops-source: owasp-api.yml\n  patterns:\n  - pattern-either:\n\
        \    - pattern: '$MODEL.find()\n\n        '\n    - pattern: '$MODEL.findAll()\n\
        \n        '\n    - pattern: 'db.query(\"SELECT * FROM $T\")\n\n        '\n\
        \    - pattern: 'res.json($MODEL.all())\n\n        '\n- id: api-no-max-body-size\n\
        \  languages:\n  - javascript\n  - typescript\n  severity: WARNING\n  message:\
        \ 'Tidak ada limit body size. Attacker bisa kirim payload besar (DoS). Set\n\
        \    `express.json({ limit: ''100kb'' })` atau body-parser limit. OWASP API4:2023.'\n\
        \  metadata:\n    cwe: 'CWE-770: Allocation of Resources Without Limits or\
        \ Throttling'\n    owasp-api: API4:2023 Unrestricted Resource Consumption\n\
        \    ai-devsecops-source: owasp-api.yml\n  patterns:\n  - pattern: '$APP.use(express.json())\n\
        \n      '\n  - pattern-not: '$APP.use(express.json({limit: $L}))\n\n     \
        \ '\n  - pattern-not: '$APP.use(express.json({limit:$L}))\n\n      '\n- id:\
        \ api-admin-endpoint-no-role-check\n  languages:\n  - javascript\n  - typescript\n\
        \  severity: ERROR\n  message: Endpoint /admin atau /api/admin tidak cek role.\
        \ Attacker user biasa bisa\n    akses. Pakai middleware `requireRole('admin')`\
        \ atau equivalent. OWASP API5:2023.\n  metadata:\n    cwe: 'CWE-285: Improper\
        \ Authorization'\n    owasp-api: API5:2023 Broken Function Level Authorization\n\
        \    ai-devsecops-source: owasp-api.yml\n  patterns:\n  - pattern-either:\n\
        \    - pattern: '$APP.get(\"/admin\", $H)\n\n        '\n    - pattern: '$APP.post(\"\
        /admin\", $H)\n\n        '\n    - pattern: '$APP.$METHOD(\"/api/admin\", $H)\n\
        \n        '\n  - pattern-not: '$APP.$METHOD(\"/admin\", requireAdmin, $H)\n\
        \n      '\n- id: api-ssrf-user-controlled-url\n  languages:\n  - javascript\n\
        \  - typescript\n  - python\n  severity: ERROR\n  message: URL dari user input\
        \ dipakai di fetch/request tanpa validasi whitelist.\n    Attacker bisa request\
        \ internal services (SSRF). OWASP API7:2023.\n  metadata:\n    cwe: 'CWE-918:\
        \ Server-Side Request Forgery (SSRF)'\n    owasp-api: API7:2023 Server Side\
        \ Request Forgery\n    ai-devsecops-source: owasp-api.yml\n  patterns:\n \
        \ - pattern-either:\n    - pattern: 'fetch($REQ.query.url)\n\n        '\n\
        \    - pattern: 'fetch($REQ.body.url)\n\n        '\n    - pattern: 'requests.get($REQ.json.url)\n\
        \n        '\n    - pattern: 'axios.get($REQ.query.url)\n\n        '\n    -\
        \ pattern: 'requests.get($REQ.args.get(\"url\"))\n\n        '\n- id: api-cors-wildcard-origin\n\
        \  languages:\n  - javascript\n  - typescript\n  severity: ERROR\n  message:\
        \ CORS pakai wildcard `*` origin. Browser akan izinkan request dari domain\n\
        \    manapun. Set explicit allowed origins. OWASP API8:2023.\n  metadata:\n\
        \    cwe: 'CWE-942: Permissive Cross-domain Policy with Untrusted Domains'\n\
        \    owasp-api: API8:2023 Security Misconfiguration\n    ai-devsecops-source:\
        \ owasp-api.yml\n  patterns:\n  - pattern-either:\n    - pattern: 'Access-Control-Allow-Origin:\
        \ *\n\n        '\n    - pattern: 'res.setHeader(\"Access-Control-Allow-Origin\"\
        , \"*\")\n\n        '\n    - pattern: 'origin: \"*\"\n\n        '\n- id: api-cors-reflect-origin\n\
        \  languages:\n  - javascript\n  - typescript\n  severity: ERROR\n  message:\
        \ CORS reflect arbitrary Origin header. Attacker bisa paksa browser kirim\n\
        \    cookie cross-origin. Set explicit allowlist origin. OWASP API8:2023.\n\
        \  metadata:\n    cwe: 'CWE-942: Permissive Cross-domain Policy with Untrusted\
        \ Domains'\n    owasp-api: API8:2023 Security Misconfiguration\n    ai-devsecops-source:\
        \ owasp-api.yml\n  patterns:\n  - pattern-either:\n    - pattern: 'res.setHeader(\"\
        Access-Control-Allow-Origin\", $REQ.headers.origin)\n\n        '\n    - pattern:\
        \ 'Access-Control-Allow-Origin: $REQ.headers.origin\n\n        '\n    - pattern:\
        \ 'cors({ origin: $REQ.headers.origin })\n\n        '\n- id: api-stack-trace-exposure\n\
        \  languages:\n  - javascript\n  - typescript\n  - python\n  severity: WARNING\n\
        \  message: Error response include stack trace atau detail internal. Attacker\
        \ bisa\n    enumerasi internal structure. Log full error server-side, return\
        \ generic message\n    ke client. OWASP API8:2023.\n  metadata:\n    cwe:\
        \ 'CWE-209: Generation of Error Message Containing Sensitive Information'\n\
        \    owasp-api: API8:2023 Security Misconfiguration\n    ai-devsecops-source:\
        \ owasp-api.yml\n  patterns:\n  - pattern-either:\n    - pattern: 'res.json({\
        \ error: $ERR.stack })\n\n        '\n    - pattern: 'res.json({ error: $ERR.message,\
        \ stack: $ERR.stack })\n\n        '\n    - pattern: 'res.status(500).send($ERR.stack)\n\
        \n        '\n    - pattern: 'traceback.format_exc()\n\n        '\n- id: ecommerce-pci-card-data-in-logs\n\
        \  languages:\n  - javascript\n  - typescript\n  severity: ERROR\n  message:\
        \ 'Jangan log data kartu kredit / payment (PAN, CVV, expiry). PCI-DSS v4.0\n\
        \    Requirement 3.4 melarang penyimpanan cleartext PAN di logs. Gunakan masker:\
        \ `card.number.slice(-4)`\n    atau tokenization.'\n  metadata:\n    cwe:\
        \ 'CWE-532: Insertion of Sensitive Information into Log File'\n    owasp-api:\
        \ API3:2023 Broken Object Property Level Authorization\n    pci-dss: 3.4 Render\
        \ PAN unreadable anywhere it is stored\n    ai-devsecops-source: ecommerce.yml\n\
        \  patterns:\n  - pattern-either:\n    - pattern: console.log(..., $CARD,\
        \ ...)\n    - pattern: console.log(..., req.body.cardNumber, ...)\n    - pattern:\
        \ console.log(..., req.body.card_number, ...)\n    - pattern: logger.info(...,\
        \ $PAN, ...)\n    - pattern: console.error(..., $CARD, ...)\n  - metavariable-pattern:\n\
        \      metavariable: $CARD\n      patterns:\n      - pattern-either:\n   \
        \     - pattern: $REQ.body.cardNumber\n        - pattern: $REQ.body.card_number\n\
        \        - pattern: $REQ.body.cvv\n        - pattern: $REQ.body.cvc\n    \
        \    - pattern: $X.card.number\n        - pattern: $X.pan\n- id: ecommerce-pci-stripe-secret-in-source\n\
        \  languages:\n  - javascript\n  - typescript\n  - python\n  severity: ERROR\n\
        \  message: Stripe live secret key terdeteksi di source. Pindahkan ke env\
        \ var atau\n    secret manager. Stripe key bocor = attacker bisa charge sembarang\
        \ customer. PCI-DSS\n    8.2.1.\n  metadata:\n    cwe: 'CWE-798: Use of Hard-coded\
        \ Credentials'\n    pci-dss: 8.2.1 Strong cryptography to render credentials\
        \ unreadable\n    owasp: A07:2021 Identification and Authentication Failures\n\
        \    ai-devsecops-source: ecommerce.yml\n  pattern-regex: \\b(sk_live_[A-Za-z0-9]{24,}|rk_live_[A-Za-z0-9]{24,})\\\
        b\n- id: ecommerce-pci-raw-pan-in-code\n  languages:\n  - javascript\n  -\
        \ typescript\n  severity: ERROR\n  message: Regex detect pola nomor kartu\
        \ kredit (16 digit) di kode. Ini indikasi hard-coded\n    test card atau data\
        \ leak. PCI-DSS melarang hard-coded PAN di source code.\n  metadata:\n   \
        \ cwe: 'CWE-798: Use of Hard-coded Credentials'\n    pci-dss: 3.4 Render PAN\
        \ unreadable\n    owasp: A02:2021 Cryptographic Failures\n    ai-devsecops-source:\
        \ ecommerce.yml\n  pattern-regex: \\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|6(?:011|5[0-9]{2})[0-9]{12})\\\
        b\n- id: ecommerce-api-bola-cart-access\n  languages:\n  - javascript\n  -\
        \ typescript\n  severity: ERROR\n  message: Endpoint mengambil object dengan\
        \ ID dari URL/body tapi tidak verifikasi\n    ownership terhadap user yang\
        \ request. Vulnerable ke IDOR / BOLA \u2014 attacker bisa\n    akses cart/order\
        \ customer lain. OWASP API1:2023.\n  metadata:\n    cwe: 'CWE-639: Authorization\
        \ Bypass Through User-Controlled Key'\n    owasp-api: API1:2023 Broken Object\
        \ Level Authorization\n    ai-devsecops-source: ecommerce.yml\n  patterns:\n\
        \  - pattern-either:\n    - pattern: '$ROUTE.get(\"/$PATH/:id\", $HANDLER)\n\
        \n        '\n    - pattern: '$ROUTE.post(\"/$PATH/:id\", $HANDLER)\n\n   \
        \     '\n    - pattern: 'router.$METHOD(\"/$PATH/:id\", $HANDLER)\n\n    \
        \    '\n  - pattern-not: '$ROUTE.$METHOD(\"/$PATH/:id\", authRequired, $HANDLER)\n\
        \n      '\n  - pattern-not: '$ROUTE.$METHOD(\"/$PATH/:id\", requireAuth, $HANDLER)\n\
        \n      '\n- id: ecommerce-api-no-auth-on-checkout\n  languages:\n  - javascript\n\
        \  - typescript\n  severity: ERROR\n  message: Endpoint /checkout, /payment,\
        \ /order, /cart tidak pakai middleware auth.\n    Customer harus login sebelum\
        \ checkout \u2014 kalau tidak, attacker bisa create order\n    tanpa akun.\
        \ OWASP API5:2023 (Broken Function Level Authorization).\n  metadata:\n  \
        \  cwe: 'CWE-306: Missing Authentication for Critical Function'\n    owasp-api:\
        \ API5:2023 Broken Function Level Authorization\n    ai-devsecops-source:\
        \ ecommerce.yml\n  patterns:\n  - pattern-either:\n    - pattern: '$APP.post(\"\
        /checkout\", $HANDLER)\n\n        '\n    - pattern: '$APP.post(\"/payment\"\
        , $HANDLER)\n\n        '\n    - pattern: '$APP.post(\"/orders\", $HANDLER)\n\
        \n        '\n    - pattern: '$APP.post(\"/cart\", $HANDLER)\n\n        '\n\
        \  - pattern-not: '$APP.post(\"/checkout\", authRequired, $HANDLER)\n\n  \
        \    '\n  - pattern-not: '$APP.post(\"/checkout\", isAuthenticated, $HANDLER)\n\
        \n      '\n- id: ecommerce-price-tampering\n  languages:\n  - javascript\n\
        \  - typescript\n  severity: ERROR\n  message: 'Harga atau quantity di-set\
        \ dari request body tanpa validasi server-side.\n    Attacker bisa kirim `{price:\
        \ 0, quantity: 999999}` dan checkout murah. Selalu\n    ambil price/quantity\
        \ dari database trusted, bukan dari request.'\n  metadata:\n    cwe: 'CWE-602:\
        \ Client-Side Enforcement of Server-Side Security'\n    owasp-api: API3:2023\
        \ Broken Object Property Level Authorization\n    ai-devsecops-source: ecommerce.yml\n\
        \  patterns:\n  - pattern-either:\n    - pattern: '$PRICE = $REQ.body.price\n\
        \n        ...\n\n        '\n    - pattern: '$QTY = $REQ.body.quantity\n\n\
        \        ...\n\n        '\n    - pattern: '$TOTAL = $REQ.body.total\n\n  \
        \      ...\n\n        '\n    - pattern: '$AMOUNT = $REQ.body.amount\n\n  \
        \      ...\n\n        '\n- id: ecommerce-discount-tampering\n  languages:\n\
        \  - javascript\n  - typescript\n  severity: ERROR\n  message: Discount/coupon\
        \ di-set dari request body tanpa validasi. Attacker bisa\n    pakai kode diskon\
        \ internal atau apply diskon 100% sendiri. Validate diskon server-side\n \
        \   dan hanya apply kode yang verified.\n  metadata:\n    cwe: 'CWE-602: Client-Side\
        \ Enforcement of Server-Side Security'\n    owasp-api: API3:2023 Broken Object\
        \ Property Level Authorization\n    ai-devsecops-source: ecommerce.yml\n \
        \ patterns:\n  - pattern-either:\n    - pattern: '$DISCOUNT = $REQ.body.discount\n\
        \n        ...\n\n        '\n    - pattern: '$COUPON = $REQ.body.coupon_code\n\
        \n        ...\n\n        '\n- id: ecommerce-mass-assignment-admin\n  languages:\n\
        \  - javascript\n  - typescript\n  - python\n  severity: ERROR\n  message:\
        \ 'Spread `req.body` atau `request.json` langsung ke object user/order. Attacker\n\
        \    bisa tambah field `is_admin: true` atau `role: ''admin''` di request\
        \ body dan\n    escalate privilege. Whitelist field yang diizinkan. OWASP\
        \ API3:2023.'\n  metadata:\n    cwe: 'CWE-915: Improperly Controlled Modification\
        \ of Dynamically-Determined Object\n      Attributes'\n    owasp-api: API3:2023\
        \ Broken Object Property Level Authorization\n    ai-devsecops-source: ecommerce.yml\n\
        \  patterns:\n  - pattern-either:\n    - pattern: '$USER = { ...$REQ.body\
        \ }\n\n        '\n    - pattern: '$USER = Object.assign({}, $REQ.body)\n\n\
        \        '\n    - pattern: 'User.create($REQ.body)\n\n        '\n    - pattern:\
        \ 'User.update($REQ.body)\n\n        '\n    - pattern: 'Order.create($REQ.body)\n\
        \n        '\n    - pattern: 'request.json  # FastAPI/Stripe-style: check if\
        \ this is followed by\n        direct model instantiation\n\n        '\n-\
        \ id: ecommerce-sqli-order-lookup\n  languages:\n  - javascript\n  - typescript\n\
        \  severity: ERROR\n  message: SQL injection risk di order/product lookup.\
        \ User input dipakai di raw SQL\n    string. Gunakan parameterized query.\
        \ OWASP A03:2021.\n  metadata:\n    cwe: 'CWE-89: SQL Injection'\n    owasp:\
        \ A03:2021 Injection\n    ai-devsecops-source: ecommerce.yml\n  patterns:\n\
        \  - pattern-either:\n    - pattern: 'db.query(\"SELECT * FROM orders WHERE\
        \ id = ''\" + $ID + \"''\")\n\n        '\n    - pattern: 'db.query(`SELECT\
        \ * FROM orders WHERE id = ${$ID}`)\n\n        '\n    - pattern: 'db.query(`SELECT\
        \ * FROM products WHERE name LIKE ''%${$X}%''`)\n\n        '\n    - pattern:\
        \ 'db.query(\"SELECT * FROM products WHERE name = ''\" + $NAME + \"''\")\n\
        \n        '\n- id: ecommerce-xss-product-render\n  languages:\n  - javascript\n\
        \  - typescript\n  severity: ERROR\n  message: Render product name/description/review\
        \ dengan innerHTML atau dangerouslySetInnerHTML.\n    Attacker bisa inject\
        \ script via product name atau review. Gunakan textContent\n    atau sanitizer.\
        \ OWASP A03:2021.\n  metadata:\n    cwe: 'CWE-79: Cross-site Scripting'\n\
        \    owasp: A03:2021 Injection\n    ai-devsecops-source: ecommerce.yml\n \
        \ patterns:\n  - pattern-either:\n    - pattern: '$EL.innerHTML = $REQ.body.productName\n\
        \n        '\n    - pattern: '$EL.innerHTML = $REQ.body.review\n\n        '\n\
        \    - pattern: '<div dangerouslySetInnerHTML={{__html: $REQ.body.description}}\
        \ />\n\n        '\n    - pattern: 'res.send($REQ.body.productName)\n\n   \
        \     '\n- id: ecommerce-csrf-no-protection\n  languages:\n  - javascript\n\
        \  - typescript\n  severity: WARNING\n  message: Payment/checkout endpoint\
        \ tidak pakai CSRF protection. Pakai csurf, double-submit\n    cookie, atau\
        \ SameSite=Strict cookie + custom header. OWASP A01:2021.\n  metadata:\n \
        \   cwe: 'CWE-352: Cross-Site Request Forgery'\n    owasp: A01:2021 Broken\
        \ Access Control\n    ai-devsecops-source: ecommerce.yml\n  patterns:\n  -\
        \ pattern-either:\n    - pattern: '$APP.post(\"/payment\", $HANDLER)\n\n \
        \       '\n    - pattern: '$APP.post(\"/checkout\", $HANDLER)\n\n        '\n\
        \    - pattern: '$APP.post(\"/transfer\", $HANDLER)\n\n        '\n  - pattern-not:\
