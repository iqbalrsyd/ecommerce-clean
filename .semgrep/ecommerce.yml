# Semgrep custom rules untuk e-commerce / payment application
# Berbasis OWASP API Security Top 10 2023 + PCI-DSS + common e-commerce flaws.
#
# Rule ini menambahkan coverage di luar `p/owasp-top-ten` dan rule-set Semgrep
# registry. Aktif hanya kalau pipeline AI mendeteksi domain "e-commerce"
# (lihat app/agents/nodes/domain_detection_node.py).
#
# Konvensi:
#   - severity: ERROR untuk security-critical, WARNING untuk best-practice
#   - cwe: CWE identifier untuk traceability
#   - owasp-api: OWASP API Security Top 10 2023 reference
#   - pci-dss: PCI-DSS v4.0 requirement

rules:

  # =========================================================================
  # PCI-DSS: Credit card / payment data handling
  # =========================================================================

  - id: ecommerce-pci-card-data-in-logs
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Jangan log data kartu kredit / payment (PAN, CVV, expiry). PCI-DSS v4.0
      Requirement 3.4 melarang penyimpanan cleartext PAN di logs. Gunakan
      masker: `card.number.slice(-4)` atau tokenization.
    metadata:
      cwe: "CWE-532: Insertion of Sensitive Information into Log File"
      owasp-api: "API3:2023 Broken Object Property Level Authorization"
      pci-dss: "3.4 Render PAN unreadable anywhere it is stored"
    patterns:
      - pattern-either:
          - pattern: console.log(..., $CARD, ...)
          - pattern: console.log(..., req.body.cardNumber, ...)
          - pattern: console.log(..., req.body.card_number, ...)
          - pattern: logger.info(..., $PAN, ...)
          - pattern: console.error(..., $CARD, ...)
      - metavariable-pattern:
          metavariable: $CARD
          patterns:
            - pattern-either:
                - pattern: $REQ.body.cardNumber
                - pattern: $REQ.body.card_number
                - pattern: $REQ.body.cvv
                - pattern: $REQ.body.cvc
                - pattern: $X.card.number
                - pattern: $X.pan

  - id: ecommerce-pci-stripe-secret-in-source
    languages: [javascript, typescript, python]
    severity: ERROR
    message: >-
      Stripe live secret key terdeteksi di source. Pindahkan ke env var
      atau secret manager. Stripe key bocor = attacker bisa charge
      sembarang customer. PCI-DSS 8.2.1.
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      pci-dss: "8.2.1 Strong cryptography to render credentials unreadable"
      owasp: "A07:2021 Identification and Authentication Failures"
    pattern-regex: '\b(sk_live_[A-Za-z0-9]{24,}|rk_live_[A-Za-z0-9]{24,})\b'

  - id: ecommerce-pci-raw-pan-in-code
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Regex detect pola nomor kartu kredit (16 digit) di kode. Ini indikasi
      hard-coded test card atau data leak. PCI-DSS melarang hard-coded
      PAN di source code.
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      pci-dss: "3.4 Render PAN unreadable"
      owasp: "A02:2021 Cryptographic Failures"
    pattern-regex: '\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|6(?:011|5[0-9]{2})[0-9]{12})\b'

  # =========================================================================
  # OWASP API1:2023 - Broken Object Level Authorization (BOLA)
  # =========================================================================

  - id: ecommerce-api-bola-cart-access
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Endpoint mengambil object dengan ID dari URL/body tapi tidak
      verifikasi ownership terhadap user yang request. Vulnerable ke
      IDOR / BOLA — attacker bisa akses cart/order customer lain.
      OWASP API1:2023.
    metadata:
      cwe: "CWE-639: Authorization Bypass Through User-Controlled Key"
      owasp-api: "API1:2023 Broken Object Level Authorization"
    patterns:
      - pattern-either:
          - pattern: |
              $ROUTE.get("/$PATH/:id", $HANDLER)
          - pattern: |
              $ROUTE.post("/$PATH/:id", $HANDLER)
          - pattern: |
              router.$METHOD("/$PATH/:id", $HANDLER)
      - pattern-not: |
          $ROUTE.$METHOD("/$PATH/:id", authRequired, $HANDLER)
      - pattern-not: |
          $ROUTE.$METHOD("/$PATH/:id", requireAuth, $HANDLER)

  - id: ecommerce-api-no-auth-on-checkout
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Endpoint /checkout, /payment, /order, /cart tidak pakai middleware
      auth. Customer harus login sebelum checkout — kalau tidak, attacker
      bisa create order tanpa akun. OWASP API5:2023 (Broken Function
      Level Authorization).
    metadata:
      cwe: "CWE-306: Missing Authentication for Critical Function"
      owasp-api: "API5:2023 Broken Function Level Authorization"
    patterns:
      - pattern-either:
          - pattern: |
              $APP.post("/checkout", $HANDLER)
          - pattern: |
              $APP.post("/payment", $HANDLER)
          - pattern: |
              $APP.post("/orders", $HANDLER)
          - pattern: |
              $APP.post("/cart", $HANDLER)
      - pattern-not: |
          $APP.post("/checkout", authRequired, $HANDLER)
      - pattern-not: |
          $APP.post("/checkout", isAuthenticated, $HANDLER)

  # =========================================================================
  # Price/Quantity Tampering (e-commerce specific)
  # =========================================================================

  - id: ecommerce-price-tampering
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Harga atau quantity di-set dari request body tanpa validasi server-side.
      Attacker bisa kirim `{price: 0, quantity: 999999}` dan checkout murah.
      Selalu ambil price/quantity dari database trusted, bukan dari request.
    metadata:
      cwe: "CWE-602: Client-Side Enforcement of Server-Side Security"
      owasp-api: "API3:2023 Broken Object Property Level Authorization"
    patterns:
      - pattern-either:
          - pattern: |
              $PRICE = $REQ.body.price
              ...
          - pattern: |
              $QTY = $REQ.body.quantity
              ...
          - pattern: |
              $TOTAL = $REQ.body.total
              ...
          - pattern: |
              $AMOUNT = $REQ.body.amount
              ...

  - id: ecommerce-discount-tampering
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Discount/coupon di-set dari request body tanpa validasi. Attacker bisa
      pakai kode diskon internal atau apply diskon 100% sendiri. Validate
      diskon server-side dan hanya apply kode yang verified.
    metadata:
      cwe: "CWE-602: Client-Side Enforcement of Server-Side Security"
      owasp-api: "API3:2023 Broken Object Property Level Authorization"
    patterns:
      - pattern-either:
          - pattern: |
              $DISCOUNT = $REQ.body.discount
              ...
          - pattern: |
              $COUPON = $REQ.body.coupon_code
              ...

  # =========================================================================
  # OWASP API3:2023 - Mass Assignment
  # =========================================================================

  - id: ecommerce-mass-assignment-admin
    languages: [javascript, typescript, python]
    severity: ERROR
    message: >-
      Spread `req.body` atau `request.json` langsung ke object user/order.
      Attacker bisa tambah field `is_admin: true` atau `role: 'admin'`
      di request body dan escalate privilege. Whitelist field yang
      diizinkan. OWASP API3:2023.
    metadata:
      cwe: "CWE-915: Improperly Controlled Modification of Dynamically-Determined Object Attributes"
      owasp-api: "API3:2023 Broken Object Property Level Authorization"
    patterns:
      - pattern-either:
          - pattern: |
              $USER = { ...$REQ.body }
          - pattern: |
              $USER = Object.assign({}, $REQ.body)
          - pattern: |
              User.create($REQ.body)
          - pattern: |
              User.update($REQ.body)
          - pattern: |
              Order.create($REQ.body)
          - pattern: |
              request.json  # FastAPI/Stripe-style: check if this is followed by direct model instantiation

  # =========================================================================
  # SQL Injection (specific to e-commerce query patterns)
  # =========================================================================

  - id: ecommerce-sqli-order-lookup
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      SQL injection risk di order/product lookup. User input dipakai di
      raw SQL string. Gunakan parameterized query. OWASP A03:2021.
    metadata:
      cwe: "CWE-89: SQL Injection"
      owasp: "A03:2021 Injection"
    patterns:
      - pattern-either:
          - pattern: |
              db.query("SELECT * FROM orders WHERE id = '" + $ID + "'")
          - pattern: |
              db.query(`SELECT * FROM orders WHERE id = ${$ID}`)
          - pattern: |
              db.query(`SELECT * FROM products WHERE name LIKE '%${$X}%'`)
          - pattern: |
              db.query("SELECT * FROM products WHERE name = '" + $NAME + "'")

  # =========================================================================
  # XSS in product rendering
  # =========================================================================

  - id: ecommerce-xss-product-render
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Render product name/description/review dengan innerHTML atau dangerouslySetInnerHTML.
      Attacker bisa inject script via product name atau review. Gunakan
      textContent atau sanitizer. OWASP A03:2021.
    metadata:
      cwe: "CWE-79: Cross-site Scripting"
      owasp: "A03:2021 Injection"
    patterns:
      - pattern-either:
          - pattern: |
              $EL.innerHTML = $REQ.body.productName
          - pattern: |
              $EL.innerHTML = $REQ.body.review
          - pattern: |
              <div dangerouslySetInnerHTML={{__html: $REQ.body.description}} />
          - pattern: |
              res.send($REQ.body.productName)

  # =========================================================================
  # CSRF on payment endpoints
  # =========================================================================

  - id: ecommerce-csrf-no-protection
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      Payment/checkout endpoint tidak pakai CSRF protection. Pakai csurf,
      double-submit cookie, atau SameSite=Strict cookie + custom header.
      OWASP A01:2021.
    metadata:
      cwe: "CWE-352: Cross-Site Request Forgery"
      owasp: "A01:2021 Broken Access Control"
    patterns:
      - pattern-either:
          - pattern: |
              $APP.post("/payment", $HANDLER)
          - pattern: |
              $APP.post("/checkout", $HANDLER)
          - pattern: |
              $APP.post("/transfer", $HANDLER)
      - pattern-not: |
          $APP.post("/payment", csrfProtection, $HANDLER)
      - pattern-not: |
          $APP.post("/checkout", csrfProtection, $HANDLER)

  # =========================================================================
  # OWASP API2:2023 - Broken Authentication
  # =========================================================================

  - id: ecommerce-jwt-weak-secret
    languages: [javascript, typescript, python]
    severity: ERROR
    message: >-
      JWT secret kelihatannya lemah atau default. JWT sign key HARUS random
      minimal 256-bit, dan HARUS di-load dari env/secret manager — tidak
      boleh di-hardcode. OWASP API2:2023.
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp-api: "API2:2023 Broken Authentication"
      pci-dss: "8.3.1 Strong authentication factors"
    patterns:
      - pattern-either:
          - pattern: jwt.sign($PAYLOAD, "secret")
          - pattern: jwt.sign($PAYLOAD, "your-256-bit-secret")
          - pattern: jwt.sign($PAYLOAD, "changeme")
          - pattern: jwt.sign($PAYLOAD, "supersecret")
          - pattern: jwt.sign($PAYLOAD, "default")
          - pattern: jwt.sign($PAYLOAD, process.env.JWT_SECRET || "secret")
          - pattern: new hmac($SECRET) where $SECRET == "secret"
          - pattern: jwt.encode($PAYLOAD, "secret", algorithm="HS256")

  - id: ecommerce-jwt-no-expiration
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      JWT tidak set expiration. Token tanpa expiry = forever valid kalau
      bocor. Set `expiresIn` di jwt.sign(). OWASP API2:2023.
    metadata:
      cwe: "CWE-613: Insufficient Session Expiration"
      owasp-api: "API2:2023 Broken Authentication"
    patterns:
      - pattern-either:
          - pattern: jwt.sign($PAYLOAD, $SECRET)
          - pattern: jwt.sign($PAYLOAD, $SECRET, $ALGO)
      - pattern-not: 'jwt.sign($PAYLOAD, $SECRET, $ALGO, { expiresIn: $EXP })'
      - pattern-not: 'jwt.sign($PAYLOAD, $SECRET, { expiresIn: $EXP })'

  # =========================================================================
  # Logging sensitive data
  # =========================================================================

  - id: ecommerce-log-sensitive-data
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      Log seluruh req.body. Bisa log password, card data, atau PII.
      Whitelist field yang di-log. PCI-DSS 3.2.
    metadata:
      cwe: "CWE-532: Insertion of Sensitive Information into Log File"
      pci-dss: "3.2 Protect stored cardholder data"
    patterns:
      - pattern-either:
          - pattern: console.log(req.body)
          - pattern: console.log($REQ.body)
          - pattern: logger.info(req.body)
          - pattern: winston.info(req.body)
          - pattern: req.log.info(req.body)
          - pattern: morgan.token("body", (req) => JSON.stringify(req.body))

  # =========================================================================
  # Crypto: weak hashing
  # =========================================================================

  - id: ecommerce-md5-password
    languages: [javascript, typescript, python]
    severity: ERROR
    message: >-
      MD5 dipakai untuk hash (kemungkinan password). MD5 broken untuk
      security. Pakai bcrypt, argon2, atau scrypt. PCI-DSS 8.3.2.
    metadata:
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      owasp: "A02:2021 Cryptographic Failures"
      pci-dss: "8.3.2 Render passwords unreadable during transmission/storage"
    patterns:
      - pattern-either:
          - pattern: crypto.createHash("md5")
          - pattern: hashlib.md5()
          - pattern: require("md5")
          - pattern: $X.md5($PASSWORD)

  - id: ecommerce-sha1-password
    languages: [javascript, typescript, python]
    severity: WARNING
    message: >-
      SHA-1 dipakai untuk hash. SHA-1 deprecated untuk security (collision
      attacks). Pakai SHA-256+ atau bcrypt untuk password.
    metadata:
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      owasp: "A02:2021 Cryptographic Failures"
    patterns:
      - pattern-either:
          - pattern: crypto.createHash("sha1")
          - pattern: hashlib.sha1()
          - pattern: require("sha1")
